<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII SHOOTER - LOGIN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #050a05;
  color: #00ff41;
  font-family: 'Share Tech Mono', monospace;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  overflow: hidden;
  position: relative;
}

/* Linhas de varredura CRT idênticas às do jogo */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 65, 0.015) 2px, rgba(0, 255, 65, 0.015) 4px);
  pointer-events: none;
  z-index: 999;
}

@keyframes flicker {
  0%, 94%, 100% { opacity: 1; }
  95% { opacity: .6; }
  96% { opacity: 1; }
  97% { opacity: .4; }
  98% { opacity: 1; }
}

/* Container do Formulário */
.login-container {
  background: #080f08;
  border: 1px solid #1a3a1a;
  box-shadow: 0 0 20px rgba(0, 255, 65, 0.05);
  width: 100%;
  max-width: 400px;
  padding: 40px 30px;
  text-align: center;
  position: relative;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.login-container:focus-within {
  border-color: #00ff41;
  box-shadow: 0 0 25px rgba(0, 255, 65, 0.15);
}

/* Título */
.login-container h1 {
  font-family: 'VT323', monospace;
  font-size: 42px;
  letter-spacing: 4px;
  text-shadow: 0 0 20px #00ff41;
  margin-bottom: 4px;
  animation: flicker 8s infinite;
}

.login-container p {
  font-size: 11px;
  color: #00aa2b;
  letter-spacing: 3px;
  margin-bottom: 35px;
  text-transform: uppercase;
}

/* Grupos de Entrada */
.input-group {
  margin-bottom: 25px;
  text-align: left;
}

.input-group label {
  display: block;
  font-size: 11px;
  color: #00aa2b;
  letter-spacing: 2px;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.input-group input {
  width: 100%;
  background: #050a05;
  border: 1px solid #1a3a1a;
  color: #00ff41;
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-group input:focus {
  border-color: #00ff41;
  box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
}

/* Mensagem de Feedback/Erro */
#error-msg {
  color: #ff3333;
  font-size: 11px;
  min-height: 18px;
  margin-bottom: 15px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

/* Botões */
.btn {
  width: 100%;
  font-family: 'Share Tech Mono', monospace;
  font-size: 15px;
  letter-spacing: 3px;
  background: transparent;
  padding: 10px;
  cursor: pointer;
  transition: background 0.15s, box-shadow 0.15s;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.btn-submit {
  color: #00ff41;
  border: 1px solid #00ff41;
}

.btn-submit:hover {
  background: rgba(0, 255, 65, 0.1);
  box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
}

.btn-offline {
  color: #ffaa00;
  border: 1px solid #ffaa00;
}

.btn-offline:hover {
  background: rgba(255, 170, 0, 0.1);
  box-shadow: 0 0 15px rgba(255, 170, 0, 0.2);
}

.btn:active {
  opacity: 0.8;
}

/* Links adicionais */
.footer-links {
  margin-top: 20px;
  font-size: 11px;
}

.footer-links a {
  color: #00aa2b;
  text-decoration: none;
  letter-spacing: 1px;
  transition: color 0.15s;
}

.footer-links a:hover {
  color: #00ff41;
  text-shadow: 0 0 5px rgba(0, 255, 65, 0.5);
}
</style>
</head>
<body>

<div class="login-container">
  <h1>ASCII SHOOTER</h1>
  <p>Aceder ao Sistema</p>

  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="input-group">
      <label for="username">Nome de Usuário</label>
      <input type="text" id="username" autocomplete="off" placeholder="Digite o seu usuário...">
    </div>

    <div class="input-group">
      <label for="password">Palavra-passe</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>

    <div id="error-msg"></div>

    <button type="submit" class="btn btn-submit">[ Entrar ]</button>
    <button type="button" class="btn btn-offline" onclick="loginOffline()">[ Entrar Offline ]</button>
  </form>

  <div class="footer-links">
    <a href="#">Criar conta de Piloto</a>
  </div>
</div>

<script>
// Função auxiliar para tocar o som de erro retrô do jogo
function playErrorSound() {
  try {
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), gn = actx.createGain();
    o.connect(gn); gn.connect(actx.destination);
    o.type = 'sawtooth'; o.frequency.value = 120;
    gn.gain.setValueAtTime(0.15, actx.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.15);
    o.start(); o.stop(actx.currentTime + 0.15);
  } catch(e) {}
}

// Login com Conta Cadastrada
function handleLogin(event) {
  event.preventDefault();
  
  const userInp = document.getElementById('username').value.trim();
  const passInp = document.getElementById('password').value;
  const errorEl = document.getElementById('error-msg');

  if (!userInp || !passInp) {
    playErrorSound();
    errorEl.style.color = "#ff3333";
    errorEl.textContent = "Preencha os campos de login!";
    return;
  }

  // Conta de exemplo local (Login: player1 | Senha: 1234)
  if (userInp === "player1" && passInp === "1234") {
    errorEl.style.color = "#00ff41";
    errorEl.textContent = "Acesso concedido! Inicializando...";
    
    setTimeout(() => {
      window.location.href = "game.html";
    }, 1000);
  } else {
    playErrorSound();
    errorEl.style.color = "#ff3333";
    errorEl.textContent = "Usuário ou Senha incorretos!";
  }
}

// Entrada em Modo Offline (Sem Conta)
function loginOffline() {
  const errorEl = document.getElementById('error-msg');
  
  // Som de confirmação agudo opcional (estilo coletar moeda)
  try {
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), gn = actx.createGain();
    o.connect(gn); gn.connect(actx.destination);
    o.type = 'sine'; o.frequency.value = 880;
    gn.gain.setValueAtTime(0.08, actx.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.1);
    o.start(); o.stop(actx.currentTime + 0.1);
  } catch(e) {}

  errorEl.style.color = "#ffaa00";
  errorEl.textContent = "Modo Convidado: Entrando offline...";

  // Redireciona diretamente para o jogo após o efeito visual
  setTimeout(() => {
    window.location.href = "game.html";
  }, 1000);
}
</script>

</body>
</html>
